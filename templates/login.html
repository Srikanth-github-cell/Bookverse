{% extends "base.html" %}

{% block title %}Login - BookVerse{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-box">
        <h2 class="auth-title">Login to <span class="neon-text">BookVerse</span></h2>

        <div class="form-group" style="margin-bottom: 1rem;">
            <label for="role">Login as</label>
            <select id="role" class="form-input" style="cursor: pointer;">
                <option value="user" selected>User (Reader)</option>
                <option value="admin">Admin</option>
            </select>
        </div>
        
        <form id="loginForm" method="POST" class="auth-form" action="{{ url_for('login') }}">
            <div class="form-group" id="emailGroup">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" class="form-input">
            </div>

            <div class="form-group" id="usernameGroup" style="display: none;">
                <label for="username">Admin Username</label>
                <input type="text" id="username" name="username" class="form-input">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required class="form-input">
            </div>
            
            <button type="submit" class="btn-submit" id="submitBtn">Login</button>
        </form>
        
        <p class="auth-switch">Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
</div>
</div>
{% endblock %}

{% block extra_js %}
<script>
  const roleEl = document.getElementById('role');
  const form = document.getElementById('loginForm');
  const emailGroup = document.getElementById('emailGroup');
  const usernameGroup = document.getElementById('usernameGroup');

  function updateForRole() {
    const role = roleEl.value;
    if (role === 'admin') {
      form.action = '/admin/login';
      emailGroup.style.display = 'none';
      usernameGroup.style.display = '';
      document.getElementById('email').required = false;
      document.getElementById('username').required = true;
    } else {
      form.action = '{{ url_for('login') }}';
      emailGroup.style.display = '';
      usernameGroup.style.display = 'none';
      document.getElementById('email').required = true;
      document.getElementById('username').required = false;
    }
  }
  roleEl.addEventListener('change', updateForRole);
  updateForRole();
</script>
{% endblock %}
